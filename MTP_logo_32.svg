<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Montpellier ECU MTP logo">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE36E"/>
      <stop offset="0.45" stop-color="#F2C230"/>
      <stop offset="1" stop-color="#B77800"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F00018"/>
      <stop offset="1" stop-color="#9A0010"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="15.2" fill="#050505"/>
  <circle cx="16" cy="16" r="14.45" fill="none" stroke="url(#gold)" stroke-width="1.15"/>

  <!-- Minimal circuit accents -->
  <g fill="none" stroke="#D71920" stroke-width="0.55" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M4.1 11.4h2.2l1.3-1.3V7.9"/>
    <circle cx="7.6" cy="7.2" r="0.55"/>
    <path d="M4.1 14h1.6l1.7-1.7"/>
    <circle cx="8.1" cy="11.6" r="0.5"/>
    <path d="M27.9 11.4h-2.2l-1.3-1.3V7.9"/>
    <circle cx="24.4" cy="7.2" r="0.55"/>
    <path d="M27.9 14h-1.6l-1.7-1.7"/>
    <circle cx="23.9" cy="11.6" r="0.5"/>
  </g>

  <!-- Occitan-inspired cross -->
  <g transform="translate(16 7.15)">
    <path d="M0-3.25
             C0.55-2.55 0.95-2.05 1.15-1.2
             C2-1.4 2.55-1.85 3.25-2.45
             C3.55-1.55 3.4-0.65 2.65 0
             C3.4 0.65 3.55 1.55 3.25 2.45
             C2.55 1.85 2 1.4 1.15 1.2
             C0.95 2.05 0.55 2.55 0 3.25
             C-0.55 2.55-0.95 2.05-1.15 1.2
             C-2 1.4-2.55 1.85-3.25 2.45
             C-3.55 1.55-3.4 0.65-2.65 0
             C-3.4-0.65-3.55-1.55-3.25-2.45
             C-2.55-1.85-2-1.4-1.15-1.2
             C-0.95-2.05-0.55-2.55 0-3.25Z"
          fill="url(#red)" stroke="url(#gold)" stroke-width="0.55"/>
    <circle cx="0" cy="-3.55" r="0.62" fill="url(#gold)"/>
    <circle cx="3.55" cy="0" r="0.62" fill="url(#gold)"/>
    <circle cx="0" cy="3.55" r="0.62" fill="url(#gold)"/>
    <circle cx="-3.55" cy="0" r="0.62" fill="url(#gold)"/>
  </g>

  <!-- Stylized M -->
  <path d="M7.15 24.45V13.25
           L12.75 18.65
           L16 21.65
           L19.25 18.65
           L24.85 13.25
           V24.45
           H22.05V18.65
           L16 24.25
           L9.95 18.65
           V24.45Z"
        fill="url(#gold)"/>

  <!-- Inner M notch -->
  <path d="M12.5 20.3L16 23.5L19.5 20.3V23.15L16 26.1L12.5 23.15Z"
        fill="url(#gold)" opacity="0.95"/>

  <!-- MTP label -->
  <text x="16" y="29.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="3.1" font-weight="700" letter-spacing="0.45"
        fill="url(#gold)">MTP</text>
</svg>
